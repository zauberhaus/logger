name: Release Check

on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check Commits
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # token: ${{ secrets.RELEASE_TOKEN }}
          release-type: go
          release-as: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}

      - name: Checkout Code 
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v6

      - name: Merge Pull Request
        if: steps.release.outputs.prs_created == 'true'
        id: merge
        run: gh pr merge --merge --auto "${{ fromJSON(steps.release.outputs.pr || '{}').number }}" 
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}